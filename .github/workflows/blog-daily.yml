name: Blog - Generation quotidienne

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Nombre d'articles a generer"
        required: false
        default: "1"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Configure git
        run: |
          git config user.name "Tourbillon Blog Bot"
          git config user.email "bot@tourbillonstudios.ch"

      - name: Generate article(s)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COUNT="${{ github.event.inputs.count || '1' }}"
          npx tsx scripts/blog-agent.ts --count "$COUNT"

      - name: Notify Telegram on success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          git pull --rebase origin main --quiet || true

          node -e "
            const fs = require('fs');
            const t = JSON.parse(fs.readFileSync('./scripts/topics.json', 'utf8'));
            const last = [...t].reverse().find(x => x.status === 'done');
            const remaining = t.filter(x => x.status === 'pending').length;
            const lines = [
              'Nouvel article publie sur Tourbillon Studios',
              'Sujet: ' + (last ? last.topic : 'inconnu'),
              'Slug: ' + (last ? last.slug : 'voir repo'),
              'Sujets restants: ' + remaining
            ];
            fs.writeFileSync('/tmp/tg_message.txt', lines.join('\n'));
          "

          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@/tmp/tg_message.txt" \
            > /dev/null

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=Erreur generation article Tourbillon Studios. Voir GitHub Actions." \
            > /dev/null
