name: 📝 Blog — Génération quotidienne

on:
  schedule:
    # 08h00 UTC = 10h00 CEST (été) / 09h00 CET (hiver)
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Nombre d'articles à générer"
        required: false
        default: "1"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Configure git
        run: |
          git config user.name "Tourbillon Blog Bot"
          git config user.email "bot@tourbillonstudios.ch"

      - name: Generate article(s)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COUNT="${{ github.event.inputs.count || '1' }}"
          npx tsx scripts/blog-agent.ts --count "$COUNT"

      - name: Notify Telegram on success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Pull latest topics.json written by the agent (it committed + pushed)
          git pull --rebase origin main --quiet || true

          INFO=$(node -e "
            const fs = require('fs');
            const t = JSON.parse(fs.readFileSync('./scripts/topics.json', 'utf8'));
            const last = [...t].reverse().find(x => x.status === 'done');
            const remaining = t.filter(x => x.status === 'pending').length;
            const slug = last ? last.slug : 'voir repo';
            const title = last ? (last.topic || slug) : '—';
            console.log(slug + '|' + remaining + '|' + title);
          ")

          SLUG=$(echo "$INFO" | cut -d'|' -f1)
          REMAINING=$(echo "$INFO" | cut -d'|' -f2)
          TITLE=$(echo "$INFO" | cut -d'|' -f3)

          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "text=✅ Nouvel article publié
Sujet: ${TITLE}
Slug: ${SLUG}
Sujets restants: ${REMAINING}" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            > /dev/null

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="❌ Erreur lors de la génération d'article Tourbillon Studios. Voir GitHub Actions pour les détails." \
            > /dev/null
