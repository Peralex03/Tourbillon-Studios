name: Blog - Preview hebdomadaire

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send weekly preview to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          WEEK=$(date '+%d/%m/%Y')

          TOPICS=$(node -e "
            const topics = require('./scripts/topics.json');
            const pending = topics.filter(t => t.status === 'pending').slice(0, 7);
            if (pending.length === 0) {
              process.stdout.write('Aucun sujet en attente.');
            } else {
              pending.forEach((t, i) => process.stdout.write((i + 1) + '. ' + t.topic + '\n'));
            }
          ")

          TOTAL_DONE=$(node -e "const t=require('./scripts/topics.json');console.log(t.filter(x=>x.status==='done').length);")
          TOTAL_PENDING=$(node -e "const t=require('./scripts/topics.json');console.log(t.filter(x=>x.status==='pending').length);")

          TEXT="Articles prevus - semaine du ${WEEK}

${TOPICS}

Publies: ${TOTAL_DONE} | En attente: ${TOTAL_PENDING}
Generation automatique chaque jour a 08h00 UTC."

          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "text=${TEXT}" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            > /dev/null

          echo "Preview sent to Telegram"
